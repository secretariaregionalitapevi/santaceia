<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Cadastro - Presença EBI - Regional Itapevi</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/styles/main.css?v=1.0.1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/scripts/auth.js?v=1.0.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  
  <div class="sac-card">
    <div class="sac-header">
      <img src="/assets/logo-ccb.png" alt="CCB" class="sac-logo" />
      <h1 class="sac-title">Lançamento Presença EBI</h1>
      <p class="sac-subtitle">Espaço Bíblico Infantil - Regional Itapevi</p>
    </div>

    <div class="sac-body">
      <form id="registerForm" class="sac-form">
        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
          <input type="text" name="fullName" placeholder="Nome completo" required />
        </div>

        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </div>
          <input type="email" name="email" placeholder="E-mail" required />
        </div>

        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
          <input type="password" name="password" id="regPassword" placeholder="Senha (mínimo 6 caracteres)" minlength="6" required />
          <div class="password-toggle" onclick="togglePassword('regPassword')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
          <input type="password" name="confirmPassword" id="regConfirmPassword" placeholder="Confirmar senha" required />
          <div class="password-toggle" onclick="togglePassword('regConfirmPassword')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          </div>
          <div class="sac-search-container">
            <input type="text" id="comumSearch" placeholder="Pesquise sua Comum..." autocomplete="off" />
            <input type="hidden" id="comumSelect" name="comum" required />
            <div id="comumResults" class="sac-search-results"></div>
          </div>
        </div>

        <p id="registerFeedback" style="color: var(--err); font-size: 14px; min-height: 20px;"></p>

        <button type="submit" class="sac-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          CRIAR CONTA
        </button>

        <div class="sac-footer-links">
          Já tem uma conta?<br>
          <a href="/login.html" style="font-weight: 700; color: #1e4b7a;">Faça login aqui</a>
        </div>
      </form>
    </div>
  </div>

  <div class="sac-page-footer">
    © Aplicativo EBI v1.0<br>
    Espaço Bíblico Infantil - Regional Itapevi
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const comumInput = document.getElementById('comumSelect');
      const comumSearch = document.getElementById('comumSearch');
      const comumResults = document.getElementById('comumResults');
      let allComuns = [];

      try {
        const resComuns = await fetch('/api/comuns');
        allComuns = await resComuns.json();
        
        const renderResults = (filter = '') => {
          const filtered = allComuns.filter(c => 
            c.comum.toLowerCase().includes(filter.toLowerCase()) || 
            c.cidade.toLowerCase().includes(filter.toLowerCase())
          );
          
          comumResults.innerHTML = filtered.map(c => `
            <div class="sac-search-item" data-value="${c.comum}">
              <strong>${c.comum}</strong><br>
              <small style="color: #64748b">${c.cidade}</small>
            </div>
          `).join('');
          
          comumResults.classList.toggle('active', filtered.length > 0 && filter !== '');
        };

        comumSearch.addEventListener('input', (e) => renderResults(e.target.value));
        comumSearch.addEventListener('focus', () => {
          if (comumSearch.value === '') renderResults('');
          comumResults.classList.add('active');
        });

        comumResults.addEventListener('mousedown', (e) => {
          const item = e.target.closest('.sac-search-item');
          if (item) {
            const val = item.dataset.value;
            comumInput.value = val;
            comumSearch.value = val;
            comumResults.classList.remove('active');
          }
        });

        document.addEventListener('click', (e) => {
          if (!comumSearch.contains(e.target) && !comumResults.contains(e.target)) {
            comumResults.classList.remove('active');
          }
        });
      } catch (err) {
        console.error('Erro ao carregar comuns:', err);
      }
    });
  </script>
</body>
</html>
