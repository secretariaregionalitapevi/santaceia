<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Principal - Presença EBI - Regional Itapevi</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/styles/main.css?v=1.0.1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/scripts/auth.js?v=1.0.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  
  <div class="top-nav">
    <div style="display: flex; align-items: center; gap: 12px;">
      <img src="/assets/logo-ccb.png" style="height: 46px;" alt="CCB" />
      <span style="font-weight: 700; color: var(--brand);">Regional Itapevi</span>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="#" id="btnLogoutTop" class="btn-logout">Sair</a>
    </div>
  </div>

  <main class="auth-wrap" style="padding: 0; display: flex; align-items: center; justify-content: center; width: 100%;">

    <div class="sac-card" style="position: relative;">
      <header class="sac-header">
        <img src="/assets/logo-ccb.png" alt="CCB" class="sac-logo" />
        <h1 class="sac-title">EBI - Espaço Bíblico Infantil</h1>
        <p class="sac-subtitle">Controle de Presença - Regional Itapevi</p>
      </header>

      <div class="sac-body">
        <form id="selectionForm" class="sac-form">
          <!-- Mês -->
          <div class="form-group">
            <div class="input-icon-box">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y1="10"></line></svg>
            </div>
            <select id="mes" name="mes" required></select>
          </div>

          <input type="hidden" id="municipio" name="municipio" required />
          <input type="hidden" id="comum" name="comum" required />

          <!-- Comum -->
          <div class="form-group">
            <div class="input-icon-box">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <div class="sac-search-container">
              <input type="text" id="comumSearch" placeholder="Pesquise sua Comum..." autocomplete="off" />
              <div id="comumResults" class="sac-search-results"></div>
            </div>
          </div>

          <div style="margin-top: 30px;">
            <p style="margin-bottom: 20px; color: #64748b; font-size: 14px;">Selecione o tipo de lançamento para continuar:</p>
            <div class="grid-btns" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
              <button type="button" class="sac-btn" data-type="all" style="margin-top: 0; font-size: 14px;">LANÇAMENTO MENSAL</button>
              <button type="button" class="sac-btn" data-type="one" style="margin-top: 0; background: #64748b; font-size: 14px;">DATA ÚNICA (AVULSA)</button>
            </div>
          </div>
        </form>
      </div>

      <footer class="sac-page-footer" style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
        © Aplicativo EBI v1.0<br>
        Espaço Bíblico Infantil - Regional Itapevi
      </footer>
    </div>
  </main>

  <script>
    // Proteger a rota e popular UI
    window.addEventListener('load', async () => {
      window.currentUser = await window.checkAuth();
      
      // Popular Comuns (Casas de Oração)
      const comumInput = document.getElementById('comum');
      const comumSearch = document.getElementById('comumSearch');
      const comumResults = document.getElementById('comumResults');
      let allComuns = [];
      const findComum = (value = '') => {
        const term = String(value || '').trim().toLowerCase();
        if (!term) return null;
        return allComuns.find((item) => String(item.comum || '').trim().toLowerCase() === term) || null;
      };

      try {
        const resComuns = await fetch('/api/comuns');
        allComuns = await resComuns.json();
        
        const renderResults = (filter = '') => {
          const filtered = allComuns.filter(c => 
            c.comum.toLowerCase().includes(filter.toLowerCase()) || 
            c.cidade.toLowerCase().includes(filter.toLowerCase())
          );
          
          comumResults.innerHTML = filtered.map(c => `
            <div class="sac-search-item" data-value="${c.comum}" data-city="${c.cidade}">
              <strong>${c.comum}</strong><br>
              <small style="color: #64748b">${c.cidade}</small>
            </div>
          `).join('');
          
          comumResults.classList.toggle('active', filtered.length > 0 && filter !== '');
        };

        comumSearch.addEventListener('input', (e) => renderResults(e.target.value));
        comumSearch.addEventListener('focus', () => {
          if (comumSearch.value === '') renderResults('');
          comumResults.classList.add('active');
        });

        comumResults.addEventListener('mouseover', (e) => {
          const item = e.target.closest('.sac-search-item');
          if (item) item.style.background = '#f1f5f9';
        });

        comumResults.addEventListener('mousedown', (e) => { // Use mousedown to trigger before blur
          const item = e.target.closest('.sac-search-item');
          if (item) {
            const val = item.dataset.value;
            const city = item.dataset.city;
            comumInput.value = val;
            comumSearch.value = val;
            document.getElementById('municipio').value = city;
            comumResults.classList.remove('active');
          }
        });

        // Fechar ao clicar fora
        document.addEventListener('click', (e) => {
          if (!comumSearch.contains(e.target) && !comumResults.contains(e.target)) {
            comumResults.classList.remove('active');
          }
        });

        // Se o usuário tem uma comum no perfil, pré-selecionar e TRAVAR
        try {
          const userEmail = window.currentUser.email || '';
          console.log(`Buscando perfil para ID: ${window.currentUser.id} e Email: ${userEmail}`);
          
          const profileRes = await fetch(`/api/profile?id=${window.currentUser.id}&email=${encodeURIComponent(userEmail)}`);
          let profile = await profileRes.json();
          console.log('Dados do perfil recebidos:', profile);

          // Fallback para metadata do usuário se o perfil no banco estiver vazio
          if ((!profile || !profile.comum) && window.currentUser.user_metadata) {
            const meta = window.currentUser.user_metadata;
            console.log('Dados de Metadata encontrados:', meta); // Debug completo
            
            // Tentar descobrir a comum em nomes de campos variados
            const userComum = meta.comum || meta.comum_congregacao || meta.congregacao || meta.polo || meta.polo_participacao || '';
            const userCity = meta.cidade || meta.municipio || (findComum(userComum) || {}).cidade || meta.polo || 'Itapevi';
            
            if (userComum) {
              console.log('Comum descoberta via metadata:', userComum);
              profile = {
                comum: userComum,
                cidade: userCity,
                full_name: meta.full_name || meta.nome || ''
              };
              
              // Auto-reparo silencioso: Sincronizar com o banco
              fetch('/api/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: window.currentUser.id, email: userEmail, ...profile })
              }).catch(() => {});
            }
          }

          if (profile && profile.comum) {
            const userComum = profile.comum;
            const userCity = profile.cidade || (findComum(userComum) || {}).cidade || 'Itapevi';
            
            comumInput.value = userComum;
            comumSearch.value = userComum;
            comumSearch.readOnly = true;
            document.getElementById('municipio').value = userCity;
            
            // Visual de campo travado
            const group = comumSearch.closest('.form-group');
            group.classList.add('is-locked');
            
            // Trocar ícone para Cadeado
            const iconBox = group.querySelector('.input-icon-box');
            iconBox.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
            
            comumSearch.placeholder = "Sua Comum está fixada";
            console.log('Trava de Comum aplicada com sucesso:', { userComum, userCity });
          }
        } catch (profileErr) {
          console.error('Erro ao buscar perfil detalhado:', profileErr);
        }
      } catch (err) {
        console.error('Erro ao carregar comuns:', err);
      }

      // Popular meses
      const mesSelect = document.getElementById('mes');
      const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
      const now = new Date();
      meses.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (i === now.getMonth()) opt.selected = true;
        mesSelect.appendChild(opt);
      });

      // Função de processamento e navegação
      const handleNavigation = (type) => {
        const mes = document.getElementById('mes').value;
        const comum = document.getElementById('comum').value;
        let municipio = document.getElementById('municipio').value;

        // Se o município estiver vazio mas a comum preenchida, tenta colocar Itapevi por padrão
        if (comum && !municipio) {
          municipio = 'Itapevi';
          document.getElementById('municipio').value = 'Itapevi';
        }

        console.log('Validando navegação:', { mes, municipio, comum });

        if (!mes || !municipio || !comum) {
          // Tenta recuperar do search se estiver preenchido mas não "clicado"
          const searchVal = document.getElementById('comumSearch').value;
          if (searchVal && (!comum || !municipio)) {
            // Se o usuário digitou mas não clicou, tentamos pegar o primeiro resultado
            const firstResult = document.querySelector('.sac-search-item');
            if (firstResult) {
              document.getElementById('comum').value = firstResult.dataset.value;
              document.getElementById('municipio').value = firstResult.dataset.city;
              return handleNavigation(type); // Tenta de novo
            }
          }

          Swal.fire({
            title: 'Campos Incompletos',
            text: 'Por favor, selecione o Mês, Município e Casa de Oração antes de prosseguir.',
            icon: 'warning',
            confirmButtonColor: '#003049'
          });
          return;
        }

        // Calcular domingos
        const mesesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const mesIndex = mesesNomes.indexOf(mes);
        const year = new Date().getFullYear();
        const sundays = [];
        const d = new Date(year, mesIndex, 1);
        while (d.getMonth() === mesIndex) {
          if (d.getDay() === 0) {
            sundays.push(new Date(d).toLocaleDateString('pt-BR'));
          }
          d.setDate(d.getDate() + 1);
        }
        
        const configData = {
          mes,
          municipio,
          comum,
          type,
          sundays
        };
        
        sessionStorage.setItem('recitativos_config', JSON.stringify(configData));
        window.location.href = '/cadastro';
      };

      // Configurar botões de tipo
      const typeBtns = document.querySelectorAll('.grid-btns .sac-btn');
      typeBtns.forEach(btn => {
        btn.onclick = () => {
          handleNavigation(btn.dataset.type);
        };
      });

      // Botão Sair (Logout)
      const btnSair = document.getElementById('btnLogoutTop');
      if (btnSair) {
        btnSair.onclick = async () => {
          if (!window.supabaseClient) await window.initSupabase();
          await window.supabaseClient.auth.signOut();
          window.location.href = '/login.html';
        };
      }

    });
  </script>
</body>
</html>
