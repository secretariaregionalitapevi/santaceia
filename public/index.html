<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Principal - Contagem Santa Ceia - Regional Itapevi</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/styles/main.css?v=1.0.1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/scripts/auth.js?v=1.0.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  
  <div class="top-nav">
    <div style="display: flex; align-items: center; gap: 12px;">
      <img src="/assets/logo-ccb.png" style="height: 46px;" alt="CCB" />
      <span style="font-weight: 700; color: var(--brand);">Regional Itapevi</span>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="#" id="btnLogoutTop" class="btn-logout">Sair</a>
    </div>
  </div>

  <main class="auth-wrap">

    <div class="sac-card" style="position: relative;">
      <header class="sac-header">
        <img src="/assets/logo-ccb.png" alt="CCB" class="sac-logo" />
        <h1 class="sac-title">Contagem Santa Ceia</h1>
        <p class="sac-subtitle">Controle de Presença - Regional Itapevi</p>
      </header>
      <div class="sac-body">
        <form id="selectionForm" class="sac-form">
          <input type="hidden" id="municipio" name="municipio" required />
          <input type="hidden" id="comum" name="comum" required />

          <!-- Comum -->
          <label style="font-size: 13px; color: #64748b; margin-bottom: 8px; display: block; font-weight: 600; text-transform: uppercase;">Selecione a Comum / Localidade</label>
          <div class="form-group">
            <div class="input-icon-box">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <div class="sac-search-container">
              <input type="text" id="comumSearch" placeholder="Pesquise a Comum..." autocomplete="off" required />
              <div id="comumResults" class="sac-search-results"></div>
            </div>
          </div>

          <div style="margin-top: 10px; display: flex; justify-content: center;">
            <button type="button" id="btnStart" class="sac-btn" style="width: auto; min-width: 200px; padding: 0 30px; font-weight: 700; letter-spacing: 1px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              INICIAR CONTAGEM
            </button>
          </div>
        </form>
      </div>
    </div>

    <footer class="sac-page-footer">
      © Aplicativo de Contagem v1.0.0<br>
      <a href="https://www.congregacaocristanobrasil.org.br/" target="_blank" style="text-decoration: underline; color: #64748b;">Congregação Cristã no Brasil</a><br>
      Regional Itapevi
    </footer>
  </main>

  <script>
    // Proteger a rota e popular UI
    window.addEventListener('load', async () => {
      window.currentUser = await window.checkAuth();
      
      // Popular Comuns (Casas de Oração)
      const comumInput = document.getElementById('comum');
      const comumSearch = document.getElementById('comumSearch');
      const comumResults = document.getElementById('comumResults');
      let allComuns = [];

      try {
        const resComuns = await fetch('/api/comuns');
        allComuns = await resComuns.json();
        
        const renderResults = (filter = '') => {
          const filtered = allComuns.filter(c => 
            c.comum.toLowerCase().includes(filter.toLowerCase()) || 
            c.cidade.toLowerCase().includes(filter.toLowerCase())
          );
          
          comumResults.innerHTML = filtered.map(c => `
            <div class="sac-search-item" data-value="${c.comum}" data-city="${c.cidade}">
              <strong>${c.comum}</strong><br>
              <small style="color: #64748b">${c.cidade}</small>
            </div>
          `).join('');
          
          comumResults.classList.toggle('active', filtered.length > 0 && filter !== '');
        };

        comumSearch.addEventListener('input', (e) => renderResults(e.target.value));
        comumSearch.addEventListener('focus', () => {
          if (comumSearch.value === '') renderResults('');
          comumResults.classList.add('active');
        });

        comumResults.addEventListener('mousedown', (e) => {
          const item = e.target.closest('.sac-search-item');
          if (item) {
            const val = item.dataset.value;
            const city = item.dataset.city;
            comumInput.value = val;
            comumSearch.value = val;
            document.getElementById('municipio').value = city;
            comumResults.classList.remove('active');
          }
        });

        document.addEventListener('click', (e) => {
          if (!comumSearch.contains(e.target) && !comumResults.contains(e.target)) {
            comumResults.classList.remove('active');
          }
        });

      } catch (err) {
        console.error('Erro ao carregar comuns:', err);
      }

      // Função de processamento e navegação
      const handleNavigation = () => {
        const comum = document.getElementById('comum').value;
        let municipio = document.getElementById('municipio').value;

        if (!municipio || !comum) {
          const searchVal = document.getElementById('comumSearch').value;
          if (searchVal) {
            const firstResult = document.querySelector('.sac-search-item');
            if (firstResult) {
              document.getElementById('comum').value = firstResult.dataset.value;
              document.getElementById('municipio').value = firstResult.dataset.city;
              return handleNavigation();
            }
          }

          Swal.fire({
            title: 'Selecione a Comum',
            text: 'Por favor, selecione uma Casa de Oração para continuar.',
            icon: 'warning',
            confirmButtonColor: '#1e4b7a'
          });
          return;
        }

        const configData = {
          municipio,
          comum,
          type: 'one'
        };
        
        sessionStorage.setItem('recitativos_config', JSON.stringify(configData));
        window.location.href = '/contagem';
      };

      const btnStart = document.getElementById('btnStart');
      btnStart.onclick = handleNavigation;

      // Botão Sair (Logout)
      const btnSair = document.getElementById('btnLogoutTop');
      if (btnSair) {
        btnSair.onclick = async () => {
          if (!window.supabaseClient) await window.initSupabase();
          await window.supabaseClient.auth.signOut();
          window.location.href = '/login.html';
        };
      }
    });
  </script>
</body>
</html>
