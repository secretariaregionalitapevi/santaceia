<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Login - Contagem Santa Ceia - Regional Itapevi</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="stylesheet" href="/styles/main.css?v=1.0.1" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/scripts/auth.js?v=1.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  
  <div class="sac-card">
    <div class="sac-header" style="padding-bottom: 10px;">
      <img src="/assets/logo-ccb.png" alt="CCB" class="sac-logo" />
      <h1 class="sac-title">Contagem Santa Ceia</h1>
      <p class="sac-subtitle">Regional Itapevi</p>
    </div>

    <div class="sac-body">
      <form id="loginForm" class="sac-form">
        <input type="hidden" id="municipio" name="municipio" required />
        <input type="hidden" id="comum" name="comum" required />

        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </div>
          <input type="email" name="email" placeholder="E-mail" required />
        </div>

        <div class="form-group">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
          <input type="password" name="password" id="loginPassword" placeholder="Sua senha" required />
          <div class="password-toggle" onclick="togglePassword('loginPassword')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </div>
        </div>

        <div class="form-group" style="margin-top: 5px;">
          <div class="input-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          </div>
          <div class="sac-search-container">
            <input type="text" id="comumSearch" placeholder="SELECIONE A COMUM / LOCALIDADE" autocomplete="off" required />
            <div id="comumResults" class="sac-search-results"></div>
          </div>
        </div>

        <p id="loginFeedback" style="color: var(--err); font-size: 14px; min-height: 20px; margin-bottom: 5px; text-align: center;"></p>

        <div style="margin-top: 10px; display: flex; justify-content: center;">
          <button type="submit" class="sac-btn" style="width: auto; min-width: 180px; padding: 0 30px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            LOGIN
          </button>
        </div>

        <div class="sac-footer-links" style="margin-top: 15px;">
          Não tem uma conta?<br>
          <a href="/registro.html" class="sac-btn-secondary">Criar conta</a>
        </div>
      </form>
    </div>
  </div>

  <div class="sac-page-footer">
    © Aplicativo de Contagem v1.0.0<br>
    <a href="https://www.congregacaocristanobrasil.org.br/" target="_blank">Congregação Cristã no Brasil</a><br>
    Regional Itapevi
  </div>

</body>
</html>
